<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Float On (Eventually) - A Modest Mouse Adventure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

:root {
-bg: #1a1208;
-bg2: #221a0a;
-paper: #f0e8d0;
-ink: #1a1208;
-rust: #c44a1a;
-gold: #d4a832;
-grey: #8a7a6a;
-pale: #e8dfc0;
-green: #4a7a3a;
-red: #8a2020;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(-bg);
color: var(-paper);
font-family: 'Courier Prime', monospace;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 20px;
background-image:
radial-gradient(ellipse at 20% 50%, rgba(196, 74, 26, 0.05) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(212, 168, 50, 0.04) 0%, transparent 40%);
}

.game-wrap {
max-width: 780px;
width: 100%;
}

header {
text-align: center;
padding: 30px 0 20px;
border-bottom: 2px solid var(-rust);
margin-bottom: 24px;
}

.title {
font-family: 'Special Elite', cursive;
font-size: 2.2rem;
color: var(-gold);
letter-spacing: 2px;
text-shadow: 2px 2px 0 #000;
line-height: 1.1;
}

.subtitle {
font-family: 'VT323', monospace;
font-size: 1.1rem;
color: var(-grey);
margin-top: 6px;
letter-spacing: 3px;
}

.scene-area {
background: var(-bg2);
border: 1px solid #3a2a10;
border-radius: 2px;
margin-bottom: 16px;
padding: 0;
overflow: hidden;
}

svg.scene {
width: 100%;
height: 200px;
display: block;
}

.stats-bar {
display: flex;
gap: 16px;
padding: 10px 16px;
background: #110e06;
border-bottom: 1px solid #2a1e08;
font-family: 'VT323', monospace;
font-size: 1.1rem;
flex-wrap: wrap;
}

.stat {
display: flex;
align-items: center;
gap: 6px;
}

.stat-label { color: var(-grey); }
.stat-val { color: var(-gold); }
.stat-val.low { color: var(-red); animation: pulse 1.5s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.narrative-box {
background: var(-paper);
color: var(-ink);
border: 1px solid #8a7a5a;
border-radius: 2px;
padding: 20px 24px;
margin-bottom: 16px;
font-family: 'Courier Prime', monospace;
font-size: 0.95rem;
line-height: 1.7;
min-height: 120px;
position: relative;
box-shadow: inset 0 0 40px rgba(0,0,0,0.08);
}

.narrative-box::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(90deg, var(-rust), var(-gold), var(-rust));
}

.narrative-text {
white-space: pre-wrap;
}

.speaker {
font-family: 'Special Elite', cursive;
font-size: 0.85rem;
color: var(-rust);
display: block;
margin-bottom: 4px;
font-style: normal;
}

.actions-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
gap: 8px;
margin-bottom: 16px;
}

.action-btn {
background: var(-bg2);
color: var(-paper);
border: 1px solid #3a2a10;
border-radius: 2px;
padding: 10px 14px;
font-family: 'Courier Prime', monospace;
font-size: 0.88rem;
cursor: pointer;
text-align: left;
transition: all 0.15s;
line-height: 1.3;
}

.action-btn:hover {
border-color: var(-gold);
color: var(-gold);
background: #2a1e08;
}

.action-btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}

.action-btn .btn-icon { margin-right: 6px; }

.inventory-panel {
background: #110e06;
border: 1px solid #2a1e08;
border-radius: 2px;
padding: 12px 16px;
margin-bottom: 16px;
font-family: 'VT323', monospace;
font-size: 1.05rem;
}

.inv-title {
color: var(-grey);
letter-spacing: 2px;
margin-bottom: 8px;
font-size: 0.85rem;
text-transform: uppercase;
}

.inv-items {
display: flex;
flex-wrap: wrap;
gap: 8px;
min-height: 30px;
}

.inv-item {
background: var(-bg2);
border: 1px solid #3a2a10;
padding: 4px 10px;
border-radius: 2px;
color: var(-pale);
font-size: 0.95rem;
}

.log-box {
background: #0e0b05;
border: 1px solid #1a1208;
border-radius: 2px;
padding: 10px 14px;
max-height: 120px;
overflow-y: auto;
font-family: 'VT323', monospace;
font-size: 0.95rem;
color: var(-grey);
}

.log-entry { border-bottom: 1px solid #1a1208; padding: 3px 0; }
.log-entry:last-child { color: var(-pale); }

.map-panel {
display: flex;
gap: 6px;
flex-wrap: wrap;
margin-bottom: 16px;
}

.map-loc {
font-family: 'VT323', monospace;
font-size: 0.95rem;
padding: 5px 12px;
border: 1px solid #2a1e08;
border-radius: 2px;
cursor: pointer;
transition: all 0.15s;
color: var(-grey);
}

.map-loc.current { border-color: var(-gold); color: var(-gold); }
.map-loc.visited { color: var(-pale); border-color: #3a2a10; }
.map-loc:hover:not(.current) { border-color: #5a4a2a; color: var(-pale); }

.end-screen {
text-align: center;
padding: 40px 20px;
font-family: 'Special Elite', cursive;
}

.end-screen h2 {
font-size: 1.8rem;
color: var(-gold);
margin-bottom: 16px;
}

.end-screen p {
font-family: 'Courier Prime', monospace;
color: var(-pale);
line-height: 1.8;
max-width: 500px;
margin: 0 auto 20px;
font-style: italic;
}

.restart-btn {
background: var(-rust);
color: var(-paper);
border: none;
padding: 12px 30px;
font-family: 'Special Elite', cursive;
font-size: 1.1rem;
cursor: pointer;
border-radius: 2px;
transition: background 0.2s;
}

.restart-btn:hover { background: #d4521e; }

.money-bar {
height: 8px;
background: #1a1208;
border: 1px solid #2a1e08;
border-radius: 2px;
overflow: hidden;
margin-top: 4px;
}

.money-fill {
height: 100%;
background: linear-gradient(90deg, var(-rust), var(-gold));
transition: width 0.5s ease;
}

.section-label {
font-family: 'VT323', monospace;
font-size: 0.8rem;
letter-spacing: 2px;
color: var(-grey);
text-transform: uppercase;
margin-bottom: 6px;
}

.gas-meter {
display: flex;
align-items: center;
gap: 8px;
}

.gas-pip {
width: 14px; height: 14px;
border: 1px solid var(-grey);
border-radius: 2px;
transition: background 0.3s;
}

.gas-pip.filled { background: var(-gold); border-color: var(-gold); }
</style>

</head>
<body>
<div class="game-wrap">

  <header>
    <div class="title">FLOAT ON (EVENTUALLY)</div>
    <div class="subtitle">a modest mouse adventure · issaquah, wa · 1997</div>
  </header>

  <div id="gameContainer"></div>

</div>

<script>
// ─── GAME STATE ───────────────────────────────────────────────────────────────
const state = {
  location: 'driveway',
  money: 0,         // cents
  bottles: 0,
  gasNeeded: 285,   // cents (≈$2.85)
  inventory: [],
  flags: {
    talkedToErnest: false,
    talkedToShelly: false,
    talkedToWayne: false,
    talkedToMary: false,
    dumpsterDived: false,
    couchSearched_shelter: false,
    couchSearched_wayne: false,
    couchSearched_laundro: false,
    dishesWashed: false,
    flyersHung: false,
    helpedDog: false,
    trunkChecked: false,
    gloveboxChecked: false,
  },
  log: [],
  turn: 0,
  gameOver: false,
  ending: null,
  visitedLocations: new Set(['driveway']),
};

// ─── LOCATIONS ────────────────────────────────────────────────────────────────
const locations = {
  driveway: {
    name: "Isaac's Driveway",
    short: "Driveway",
    svg: drawDriveway,
    description: () => `Your '88 Civic sits in the driveway like a casket. The engine won't turn over - clicked twice then went silent like it was embarrassed for you. The needle's been on E since Tuesday. Maybe Wednesday. The key is still in the ignition.${!state.flags.trunkChecked ? '' : ''}`,
    actions: [
      {
        label: '🔑 Try the ignition again',
        key: 'try_ignition',
        available: () => true,
        do: () => {
          const tries = ["Nothing. A dry click and some dignity lost.", "Same click. The car is tired of this bit.", "You're starting to wonder if the car has a point.", "The clicking is getting quieter. Or you're going deaf from sadness.", "It's not going to start, Isaac."];
          const t = Math.min(state.turn, tries.length-1);
          narrative(tries[t]);
          log("Tried ignition. Still no.");
        }
      },
      {
        label: '🧳 Check the trunk',
        key: 'trunk',
        available: () => !state.flags.trunkChecked,
        do: () => {
          state.flags.trunkChecked = true;
          addItem('Bungee cord (worthless)');
          addItem('Cassette: Lonesome Crowded West (yours)');
          gainMoney(22, 'loose change in trunk');
          narrative("The trunk has a bungee cord, your own tape - which is a specific kind of self-pity - and twenty-two cents in the wheel well.");
        }
      },
      {
        label: '📻 Check the glovebox',
        key: 'glovebox',
        available: () => !state.flags.gloveboxChecked,
        do: () => {
          state.flags.gloveboxChecked = true;
          gainMoney(15, 'glovebox');
          narrative("Registration, three napkins, a pen that doesn't work, and fifteen cents. The pen really doesn't work. You tried it four times.");
        }
      },
      {
        label: '🗺️ Head somewhere',
        key: 'goto',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  gas_station: {
    name: "Richie's Gas & Stop",
    short: "Gas Station",
    svg: drawGasStation,
    description: () => {
      const have = moneyStr(state.money);
      const need = moneyStr(state.gasNeeded);
      return `Richie is behind the bulletproof glass reading a boating magazine. He doesn't own a boat. The pump is right there. You need ${need} for a gallon and a half. You have ${have}.${state.money >= state.gasNeeded ? "\n\nYou have enough." : ""}`;
    },
    actions: [
      {
        label: '⛽ Buy gas',
        key: 'buy_gas',
        available: () => state.money >= state.gasNeeded,
        do: () => {
          state.money -= state.gasNeeded;
          addItem('1.5 gallons of regular unleaded');
          narrative("Richie slides the change through the slot without looking up from the marina. You pump the gas. The nozzle clicks off with a sound like finality.\n\nYou drive the can back to the driveway.");
          log("Bought gas. $2.85 gone.");
          goTo('driveway_end');
        }
      },
      {
        label: '💬 Talk to Richie',
        key: 'talk_richie',
        available: () => true,
        do: () => {
          narrative("\"Hey Richie, you got any work?\"\n\nHe turns the magazine sideways to look at a boat. \"Nope.\"\n\n\"Know anyone who does?\"\n\n\"Nope.\"\n\nYou stand there another ten seconds to prove you're not embarrassed. You are.");
          log("Richie was unhelpful.");
        }
      },
      {
        label: '⬅️ Leave',
        key: 'leave',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  earnests: {
    name: "Ernest's House",
    short: "Ernest's",
    svg: drawHouse1,
    description: () => `Ernest's porch has four empty bottles of Mickey's on it. He's in the yard trying to fix a lawnmower with a butter knife. The yard has never been mowed. The lawnmower has never worked. This is a hobby.`,
    actions: [
      {
        label: '💬 Ask Ernest for bottles',
        key: 'ernest_bottles',
        available: () => !state.flags.talkedToErnest,
        do: () => {
          state.flags.talkedToErnest = true;
          gainBottles(4);
          narrative("\"Hey Ernest, those bottles-\"\n\n\"Take 'em.\"\n\nHe waves you off without looking up. You take the four Mickey's bottles off the porch. He gets up, goes inside, comes back with two more.\n\n\"These too.\"");
          gainBottles(2);
          log("Ernest gave you 6 bottles. No questions.");
        }
      },
      {
        label: '🔧 Help with the lawnmower',
        key: 'ernest_mower',
        available: () => state.flags.talkedToErnest && !state.flags.helpedDog,
        do: () => {
          state.flags.helpedDog = true;
          gainMoney(35, 'helping Ernest');
          narrative("You hold the carburetor while Ernest tightens something. Neither of you knows what you're doing but together you manage to make the engine run for seven seconds before it dies again. He seems satisfied.\n\n\"Here,\" he says, and gives you thirty-five cents from his pocket. There's a button in there too. He keeps the button.");
          log("Helped Ernest. +35¢");
        }
      },
      {
        label: '⬅️ Leave',
        key: 'leave',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  shellys: {
    name: "Shelly's Apartment",
    short: "Shelly's",
    svg: drawApartment,
    description: () => `Shelly lives on the second floor of a building that smells like carpet cleaner and defeat. You can hear her TV through the door.`,
    actions: [
      {
        label: '🚪 Knock on Shelly\'s door',
        key: 'shelly_knock',
        available: () => !state.flags.talkedToShelly,
        do: () => {
          state.flags.talkedToShelly = true;
          narrative("She opens the door with the chain still on.\n\n\"Isaac.\"\n\n\"Hey Shelly. My car-\"\n\n\"I heard. Ernest called.\" She hands you four bottles through the gap. Rainier. \"There's thirty cents in that bag I was gonna return too.\"\n\nShe closes the door. You hear the TV get louder.");
          gainBottles(4);
          gainMoney(30, 'Shelly\'s bag return');
          log("Shelly gave bottles + 30¢. Classic Shelly.");
        }
      },
      {
        label: '🛋️ Search Shelly\'s couch (she offered)',
        key: 'shelly_couch',
        available: () => state.flags.talkedToShelly && !state.flags.couchSearched_shelter,
        do: () => {
          state.flags.couchSearched_shelter = true;
          const found = Math.floor(Math.random() * 40) + 20;
          gainMoney(found, 'Shelly\'s couch cushions');
          narrative(`You go back and knock again. She sighs, opens the door fully this time. The couch is a floral thing that's been through a lot. You find ${found} cents in the cushions. A guitar pick (not yours), a lifesaver, and a battery.\n\nShelly watches from the kitchen doorway. \"Find anything?\"\n\n\"Yeah.\"\n\n\"Good.\"`);
          log(`Couch at Shelly's: +${found}¢`);
        }
      },
      {
        label: '⬅️ Leave',
        key: 'leave',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  waynes: {
    name: "Wayne's Trailer",
    short: "Wayne's",
    svg: drawTrailer,
    description: () => `Wayne's trailer has wind chimes made of spoons. He's on his porch with a beer and a dog that is too big for the trailer. The dog looks apologetic about it.`,
    actions: [
      {
        label: '💬 Ask Wayne for change',
        key: 'wayne_ask',
        available: () => !state.flags.talkedToWayne,
        do: () => {
          state.flags.talkedToWayne = true;
          narrative("\"I'm tapped, Isaac. Truly.\"\n\nYou believe him. You always believe him and he's always right.\n\n\"But the couch,\" he says, jerking his thumb inside. \"Go ahead. And there's maybe two bottles by the fence.\"");
          gainBottles(2);
          log("Wayne's broke. Couch unlocked.");
        }
      },
      {
        label: '🛋️ Search Wayne\'s couch',
        key: 'wayne_couch',
        available: () => state.flags.talkedToWayne && !state.flags.couchSearched_wayne,
        do: () => {
          state.flags.couchSearched_wayne = true;
          gainMoney(58, 'Wayne\'s couch');
          narrative("The couch has seen decades of collective American longing. Under the third cushion: a dollar bill, but it's ripped and taped back together - still legal tender. You take it.\n\nThere's also forty-three cents in coin, a 1989 baseball card of someone who never made it, and a guitar string.\n\nWayne watches from the door. \"Find the dollar?\"\n\n\"Yeah.\"\n\n\"Good.\"\n\nFifty-eight cents net after the dollar goes into your count (you didn't have the heart to count the dollar, so you did).");
          log("Wayne's couch: +58¢ + dignity questions");
        }
      },
      {
        label: '🎸 Play Wayne a song for change',
        key: 'wayne_song',
        available: () => state.flags.talkedToWayne && state.inventory.includes('Cassette: Lonesome Crowded West (yours)'),
        do: () => {
          if (state.flags.wayneSong) { narrative("Wayne puts his hand up. \"I'm good, Isaac.\""); return; }
          state.flags.wayneSong = true;
          gainMoney(50, 'Wayne liked the tape');
          narrative("You put the tape in Wayne's boom box on the porch. He listens to three songs without speaking. Then he digs in his vest pocket and sets fifty cents on the railing.\n\n\"That's good,\" he says.\n\nYou take the money.\n\n\"Yeah,\" you say.");
          log("Played tape for Wayne: +50¢");
        }
      },
      {
        label: '⬅️ Leave',
        key: 'leave',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  laundromat: {
    name: "Coin-Op Laundromat",
    short: "Laundromat",
    svg: drawLaundromat,
    description: () => `The laundromat is always open and always empty except for one person who looks like they've been there since morning. Today it's Mary, who is reading a dog-eared western and has three machines going at once.`,
    actions: [
      {
        label: '🛋️ Check the waiting area couch',
        key: 'laundro_couch',
        available: () => !state.flags.couchSearched_laundro,
        do: () => {
          state.flags.couchSearched_laundro = true;
          gainMoney(44, 'laundromat couch');
          narrative("The waiting area has a couch that no one ever sat on by choice. You check beneath the cushions. Forty-four cents, a button, and a Werther's still in the wrapper.\n\nYou take the change. You leave the Werther's. You're not that desperate.\n\nYou're a little that desperate. You take the Werther's.");
          addItem("Werther's Original (floor couch)");
          log("Laundromat couch: +44¢");
        }
      },
      {
        label: '💬 Talk to Mary',
        key: 'talk_mary',
        available: () => !state.flags.talkedToMary,
        do: () => {
          state.flags.talkedToMary = true;
          narrative("Mary looks up from her western. She has the expression of someone who has been waiting for something for a long time and has made peace with the wait.\n\n\"Your car?\"\n\n\"Yeah.\"\n\n\"I got bottles. And there's a job if you want it. Dishes at Peet's. An hour, she'll give you two dollars cash.\"");
          gainBottles(3);
          log("Mary: 3 bottles + dishwashing job.");
        }
      },
      {
        label: '🍽️ Wash dishes at Peet\'s (Mary\'s lead)',
        key: 'wash_dishes',
        available: () => state.flags.talkedToMary && !state.flags.dishesWashed,
        do: () => {
          state.flags.dishesWashed = true;
          gainMoney(200, 'washing dishes at Peet\'s');
          narrative("Peet's is three blocks. The owner, a woman named Sandra who has no patience for anything, hands you rubber gloves and points at a pile of dishes that suggests Peet's has been busy or hasn't done dishes in a week.\n\nYou wash for fifty minutes. Your hands get that dishwater feeling. She counts out two dollars in quarters and slides them across the counter without a word.\n\nYou pocket them. You feel like a person for approximately forty-five seconds.");
          log("Washed dishes: +$2.00 ✓");
        }
      },
      {
        label: '📋 Hang flyers (Mary has a job)',
        key: 'hang_flyers',
        available: () => state.flags.talkedToMary && !state.flags.flyersHung,
        do: () => {
          state.flags.flyersHung = true;
          gainMoney(75, 'hanging flyers');
          narrative("Mary pulls a rolled sheaf of flyers from her laundry bag. Garage sale. Three blocks up, four blocks over, two on the main strip.\n\n\"Seventy-five cents if you do all nine.\"\n\nYou do all nine. The staple gun is satisfying in a way you can't explain. When you hand the gun back she gives you three quarters.\n\n\"You got any more jobs?\" you ask.\n\n\"Not for you,\" she says, not unkindly.");
          log("Hung flyers: +75¢");
        }
      },
      {
        label: '⬅️ Leave',
        key: 'leave',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  village_theatre: {
    name: "Village Theatre (First Stage Block)",
    short: "Village Theatre",
    svg: drawTheatre,
    description: () => `Front Street's lit up by the old First Stage building and the newer Gaudette Theatre across the way. In 1997, everybody still calls it \"the Village\" like it's one room, even though the big Gaudette house opened in '94 and changed the whole block.`,
    actions: [
      {
        label: '🎭 Talk to Mara at the box office',
        key: 'talk_mara',
        available: () => !state.flags.talkedToMara,
        do: () => {
          state.flags.talkedToMara = true;
          narrative("Mara counts ticket stubs with one hand and answers your disaster with the other.\n\n\"Your Civic died?\"\n\n\"Yeah.\"\n\n\"Usher call-out tonight. Forty-five minutes. Cash envelope after curtain.\"\n\nYou nod like this is a normal career move.");
          log("Mara offered an usher shift.");
        }
      },
      {
        label: '🎟️ Usher late seating for Act One',
        key: 'usher_shift',
        available: () => state.flags.talkedToMara && !state.flags.usheredAtVillage,
        do: () => {
          state.flags.usheredAtVillage = true;
          gainMoney(110, 'usher shift at Village Theatre');
          narrative("You hand out programs, whisper \"watch your step\" fourteen times, and seat three families after lights down without dropping a flashlight. Mara slips you a folded envelope on break.\n\n\"Hundred and ten,\" she says. \"And take these cans from concessions before they go flat.\"");
          gainBottles(5);
          log("Ushered at Village Theatre: +$1.10 and 5 bottles.");
        }
      },
      {
        label: '⬅️ Leave',
        key: 'leave',
        available: () => true,
        do: () => showMap()
      }
    ]
  },

  pickering_place: {
    name: "Pickering Place Offices",
    short: "Pickering Place",
    svg: drawOfficePark,
    description: () => `At Pickering Place, the Costco office buildings still smell new. They moved their HQ here from Kirkland last year (1996), and now half the parking lot is membership cards and coffee thermoses.`,
    actions: [
      {
        label: '💬 Ask Glen by the loading door',
        key: 'talk_glen',
        available: () => !state.flags.talkedToGlen,
        do: () => {
          state.flags.talkedToGlen = true;
          narrative("Glen is on smoke break in a blue vest with his badge flipped backward.\n\n\"No hiring today,\" he says before you finish asking. \"But marketing dumped a box of old flyer inserts in receiving. Sort the recycling and I'll cover your bus fare equivalent.\"");
          log("Glen offered a quick sorting job.");
        }
      },
      {
        label: '📦 Sort flyer inserts for recycling',
        key: 'sort_flyers',
        available: () => state.flags.talkedToGlen && !state.flags.sortedFlyersAtCostco,
        do: () => {
          state.flags.sortedFlyersAtCostco = true;
          gainMoney(95, 'sorting paper at Pickering Place');
          gainBottles(3);

// ─── MAP ORDER ────────────────────────────────────────────────────────────────
const mapOrder = ['driveway','earnests','shellys','waynes','laundromat','alley','bottle_depot','gas_station'];
const addedMapLocations = ['village_theatre', 'pickering_place'];

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function moneyStr(cents) {
  if (cents < 100) return `${cents}¢`;
  const d = Math.floor(cents/100), c = cents%100;
  return c > 0 ? `$${d}.${String(c).padStart(2,'0')}` : `$${d}.00`;
}

function gainMoney(cents, source) {
  state.money += cents;
  log(`+${moneyStr(cents)} (${source})`);
}

function gainBottles(n) {
  state.bottles += n;
  log(`+${n} bottle${n!==1?'s':''}`);
}

function addItem(item) {
  if (!state.inventory.includes(item)) state.inventory.push(item);
}

function removeItem(item) {
  state.inventory = state.inventory.filter(i => i !== item);
}

function narrative(text) {
  const box = document.getElementById('narrative');
  if (box) {
    box.innerHTML = `<span class="narrative-text">${text}</span>`;
  }
  state.turn++;
}

function log(entry) {
  state.log.unshift(entry);
  if (state.log.length > 20) state.log.pop();
}

function goTo(loc) {
  state.location = loc;
  state.visitedLocations.add(loc);
  render();
}

function showMap() {
  narrative("Where do you need to go?\n\n(Use the map below.)");
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('gameContainer');

  if (state.gameOver && state.ending === 'ending') {
    container.innerHTML = renderEnding();
    return;
  }

  if (!locations[state.location]) state.location = 'driveway';
  const loc = locations[state.location];
  const pct = Math.min(100, Math.round((state.money / state.gasNeeded) * 100));
  const gasGotten = state.inventory.includes('1.5 gallons of regular unleaded');

  container.innerHTML = `
    <div class="scene-area">
      ${loc.svg()}
      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">MONEY:</span>
          <span class="stat-val ${state.money < 100 ? 'low' : ''}">${moneyStr(state.money)}</span>
        </div>
        <div class="stat">
          <span class="stat-label">NEED:</span>
          <span class="stat-val">$2.85</span>
        </div>
        <div class="stat">
          <span class="stat-label">BOTTLES:</span>
          <span class="stat-val">${state.bottles}</span>
        </div>
        <div class="stat gas-meter">
          <span class="stat-label">PROGRESS:</span>
          ${Array.from({length:10},(_,i)=>`<div class="gas-pip ${i < Math.floor(pct/10) ? 'filled' : ''}"></div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-label">↳ ${loc.name.toUpperCase()}</div>

    <div class="narrative-box">
      <span class="narrative-text">${loc.description()}</span>
    </div>

    <div id="narrative" class="narrative-box" style="display:none; min-height:80px;"></div>

    <div class="actions-grid">
      ${loc.actions.map((a,i) => `
        <button class="action-btn" ${!a.available() ? 'disabled' : ''} onclick="doAction(${i})">
          ${a.label}
        </button>
      `).join('')}
    </div>

    <div style="margin-bottom:16px;">
      <div class="section-label">LOCATIONS</div>
      <div class="map-panel">
        ${[...mapOrder.slice(0,5), ...addedMapLocations, ...mapOrder.slice(5)]
          .filter(l => l !== 'driveway_end' && locations[l]).map(l=>`
          <div class="map-loc ${state.location===l?'current':''} ${state.visitedLocations.has(l)?'visited':''}" onclick="goTo('${l}')">
            ${locations[l].short}
          </div>
        `).join('')}
      </div>
    </div>

    <div class="inventory-panel">
      <div class="inv-title">INVENTORY</div>
      <div class="inv-items">
        ${state.inventory.length === 0 ? '<span style="color:#3a2a10;font-size:0.9rem;">empty pockets</span>' :
          state.inventory.map(i=>`<div class="inv-item">${i}</div>`).join('')}
      </div>
    </div>

    <div class="section-label">LOG</div>
    <div class="log-box">
      ${state.log.slice(0,12).map(e=>`<div class="log-entry">${e}</div>`).join('') || '<div class="log-entry" style="color:#2a2a20;">nothing yet</div>'}
    </div>
  `;

  // show narrative box if it has content
  const narBox = document.getElementById('narrative');
  if (narBox && narBox.innerHTML.trim()) narBox.style.display = 'block';
}

function doAction(i) {
  const loc = locations[state.location];
  const action = loc.actions[i];
  if (action && action.available()) {
    action.do();
    // refresh actions + narrative
    render();
    // restore narrative if it was set
    const narBox = document.getElementById('narrative');
    if (narBox) {
      const lastNarText = state._lastNarrative;
    }
  }
}

// patch narrative to persist across render
const _origNarrative = narrative;
let _storedNarrative = '';
window.narrative = function(text) {
  _storedNarrative = text;
  _origNarrative(text);
};

// Override doAction to restore narrative after render
window.doAction = function(i) {
  const loc = locations[state.location];
  const action = loc.actions[i];
  if (action && action.available()) {
    _storedNarrative = '';
    action.do();
    render();
    if (_storedNarrative) {
      const narBox = document.getElementById('narrative');
      if (narBox) {
        narBox.innerHTML = `<span class="narrative-text">${_storedNarrative}</span>`;
        narBox.style.display = 'block';
      }
    }
  }
};

function renderEnding() {
  return `
    <div class="end-screen">
      <div style="font-family:'Special Elite',cursive; font-size:1rem; color:var(--rust); letter-spacing:3px; margin-bottom:20px;">EPILOGUE</div>
      <h2>click.</h2>
      <svg width="300" height="120" viewBox="0 0 300 120" style="margin:0 auto 24px;display:block;">
        <rect width="300" height="120" fill="#1a1208"/>
        <rect x="30" y="35" width="240" height="55" fill="#2a3a4a" rx="4"/>
        <rect x="80" y="15" width="140" height="30" fill="#2a3a4a" rx="6"/>
        <rect x="90" y="19" width="55" height="22" fill="#0f1a2a" rx="2"/>
        <rect x="152" y="19" width="55" height="22" fill="#0f1a2a" rx="2"/>
        <circle cx="80" cy="92" r="16" fill="#111" stroke="#3a3a3a" stroke-width="2"/>
        <circle cx="80" cy="92" r="7" fill="#2a2a2a"/>
        <circle cx="220" cy="92" r="16" fill="#111" stroke="#3a3a3a" stroke-width="2"/>
        <circle cx="220" cy="92" r="7" fill="#2a2a2a"/>
        <text x="150" y="58" text-anchor="middle" fill="#c44a1a" font-family="VT323" font-size="18">click.</text>
      </svg>
      <p>You pour in the gas. You get in the car. You turn the key.<br><br>Click.<br><br>The car has been trying to tell you something. You just weren't listening to the right part of it.</p>
      <p style="font-size:0.85rem; color:var(--grey); margin-top:12px;">"It's the solenoid," Ernest will tell you tomorrow. "Or the starter. Or the fuel pump. Or just the car being the car."</p>
      <p style="font-size:0.85rem; color:var(--grey);">You walk back inside. You put the tape in the tape deck. The tape deck is a boombox on your kitchen table.<br><br>Float on.</p>
      <div style="margin-top:30px; font-family:'VT323',monospace; color:var(--gold); font-size:1.2rem; letter-spacing:3px; margin-bottom:20px;">
        ${moneyStr(state.money)} left in your pocket. ${state.bottles} bottles uncashed.<br>
        It was a good day, mostly.
      </div>
      <button class="restart-btn" onclick="restartGame()">Play Again</button>
    </div>
  `;
}

function restartGame() {
  Object.assign(state, {
    location: 'driveway',
    money: 0,
    bottles: 0,
    inventory: [],
    flags: Object.fromEntries(Object.keys(state.flags).map(k=>[k,false])),
    log: [],
    turn: 0,
    gameOver: false,
    ending: null,
    visitedLocations: new Set(['driveway']),
  });
  _storedNarrative = '';
  render();
}

window.goTo = function(loc) {
  state.location = loc;
  state.visitedLocations.add(loc);
  _storedNarrative = '';
  render();
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
